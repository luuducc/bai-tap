<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bài Tập</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .ruler-container {
      background-color: #f0f9ff;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .ruler-image {
      background-color: #ff99bb;
      height: 60px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      position: relative;
      margin: 40px 0;
    }

    .tick {
      width: 2px;
      background-color: #333;
      position: absolute;
    }

    .tick-large {
      height: 30px;
    }

    .tick-small {
      height: 15px;
    }

    .label {
      position: absolute;
      top: -35px;
      font-weight: bold;
      font-size: 1.2rem;
      transform: translateX(-50%);
    }

    input:focus {
      outline: none;
      /* ring: 2px solid #3b82f6; */
    }

    .correct {
      background-color: #d1fae5 !important;
      border-color: #10b981 !important;
      color: #065f46 !important;
      animation: bounce 0.5s;
    }

    .incorrect {
      background-color: #fee2e2 !important;
      border-color: #ef4444 !important;
      color: #991b1b !important;
      animation: shake 0.3s;
    }

    .warning {
      background-color: #fef3c7 !important;
      /* soft yellow */
      border-color: #f59e0b !important;
      /* amber */
      color: #92400e !important;
      /* dark amber text */
      animation: pulse 0.4s;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-8px);
      }

      75% {
        transform: translateX(8px);
      }
    }

    .confetti {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 5rem;
      z-index: 50;
      display: none;
      pointer-events: none;
    }

    .custom-select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background: none;
      /* remove default styling */
      cursor: pointer;

      padding: 0;
      /* remove default padding */
      text-align: center;
      /* horizontal center */
      line-height: 3rem;
      text-align-last: center;
      /* KEY for select */
      /* match height (h-12 = 48px ≈ 3rem) */
    }
  </style>
</head>

<body class="bg-blue-50 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-6xl w-full bg-white rounded-2xl shadow-2xl p-8 border border-gray-100">
    <!-- Đề bài -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-4">
        <div
          class="bg-purple-600 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-xl shadow-md">
          ⭐
        </div>
        <h1 class="text-2xl font-bold text-gray-800">
          Điền dấu <span class="text-yellow-500 font-black">&gt; &lt; =</span>
        </h1>
      </div>
    </div>

    <!-- Fill number questions -->
    <div id="fill-number-container"></div>

    <!-- Compare questions -->
    <div id="compare-quiz-container"></div>

    <!-- Nộp bài -->
    <div class="flex gap-4">
      <button id="submit-btn"
        class="flex-[2] bg-purple-600 hover:bg-purple-700 text-white font-black py-5 rounded-2xl shadow-xl text-xl transition-all active:scale-95">
        KIỂM TRA NGAY
      </button>
      <button id="reset-btn"
        class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-5 rounded-2xl active:scale-95">
        LÀM LẠI
      </button>
    </div>

    <div id="message" class="mt-8 text-center text-3xl font-black transition-all transform scale-0"></div>
  </div>

  <div id="confetti" class="confetti">✨🥳✨</div>

  <script type="module">
    import { fillNumberQuestions, compareQuestions } from './raw_input.js'

    document.getElementById("submit-btn").addEventListener("click", checkAnswers)
    document.getElementById("reset-btn").addEventListener("click", resetApp)
    let audioCtx

    const inputs1 = fillNumberQuestions.map((item1, index1) => ({
      ...item1,
      id: `fill-number-${index1}`,
      questions: item1.questions.map((item2, index2) => ({
        id: `fill-number-${index1}-${index2}`,
        ...item2
      }))
    }))

    const inputs2 = compareQuestions.map((item, index) => {
      if (item.op1 < item.op2) item.ans = '<'
      if (item.op1 > item.op2) item.ans = '>'
      if (item.op1 == item.op2) item.ans = '='
      return {
        id: `select-${index}`,
        ...item
      }
    })

    renderFillNumberQuiz()
    renderCompareQuiz()


    inputs1.forEach(item => 
      item.questions.forEach(question => 
        document.getElementById(question.id).addEventListener('change', onInputChange)
      )
    )
    inputs2.forEach(({ id }) => {
      document.getElementById(id).addEventListener('change', onInputChange)
    })

    function renderCompareQuiz() {
      const container = document.getElementById("compare-quiz-container")

      const promptHTML = `
        <p class="text-lg text-gray-700 mb-8 font-medium">
          Hãy so sánh các số sau:
        </p>
      `

      const innerQuestionsHTML = inputs2.map(({ id, op1, op2 }) => `
        <div class="flex px-1 py-2 items-center justify-center gap-4 text-3xl font-black bg-gray-100 rounded-xl">
          <span>${op1}</span>

          <select id="${id}"
            class="custom-select w-12 h-12 text-2xl border-2 border-gray-300 rounded-lg text-center leading-none">
            <option value="">?</option>
            <option value="<">&lt;</option>
            <option value=">">&gt;</option>
            <option value="=">=</option>
          </select>

          <span>${op2}</span>
        </div>
      `).join("")

      const questionHTML = `
        <div class="grid sm:grid-cols-4 lg:grid-cols-6 gap-8 mb-8">
          ${innerQuestionsHTML}
        </div>
      `

      container.innerHTML = promptHTML + questionHTML
    }

    function renderFillNumberQuiz() {
      const container = document.getElementById("fill-number-container")

      container.innerHTML = inputs1.map(({ id, prompt, pictureUrl, unit, questions }) => {
        const promptHTML = `
          <p class="text-lg text-gray-700 mb-8 font-medium">
            ${prompt}
          </p>
        `
        const imageUrlHTML = `
          <div class="w-full h-64 mb-4 bg-gray-100 flex items-center justify-center overflow-hidden rounded-xl">
            <img src="${pictureUrl}" class="max-w-full max-h-full object-contain" alt="Hình ảnh đề bài" />
          </div>
        `

        const innerQuestionsHTML = questions.map(question => `
          <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl transition-all" id="">
            <span class="text-lg font-bold text-gray-700">${question.label}</span>
            <div class="flex items-center gap-2">
              <input type="number" inputmode="numeric" pattern="[0-9]*" id="${question.id}"
                class="w-24 p-2 text-center text-2xl font-black border-2 border-gray-300 rounded-lg focus:border-purple-500"
                placeholder="?">
              <span class="text-xl font-bold text-gray-500">${unit}</span>
            </div>
          </div>
        `).join('')

        const questionsHTML = `
          <div class="grid gap-4 mb-8">
            ${innerQuestionsHTML}
          </div>
        `
        return promptHTML + imageUrlHTML + questionsHTML
      }).join("")
    }

    function onInputChange() {
      inputs1.forEach(item =>
        item.questions.forEach(({ id}) => 
          document.getElementById(id).classList.remove('correct', 'incorrect', 'warning')
        )
      )

      inputs2.forEach(({ id }) => {
        document.getElementById(id).classList.remove('correct', 'incorrect', 'warning')
      })

      document.getElementById("message").style.transform = "scale(0)"
      document.getElementById("confetti").style.display = "none"
    }

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)()
      }
    }

    // Fallback sounds in case external links fail to load due to CORS/Network
    function playSound(type) {
      initAudio()
      const now = audioCtx.currentTime

      switch (type) {
        case "correct": {
          const playTing = (time) => {
            const osc = audioCtx.createOscillator()
            const gain = audioCtx.createGain()
            osc.connect(gain)
            gain.connect(audioCtx.destination)

            osc.type = "sine"
            osc.frequency.setValueAtTime(1046.5, time)
            gain.gain.setValueAtTime(0.2, time)
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3)

            osc.start(time)
            osc.stop(time + 0.3)
          }

          playTing(now)
          playTing(now + 0.1)
          break
        }

        case "warning": {
          // softer, neutral notification (mid-high tone, short)
          const osc = audioCtx.createOscillator()
          const gain = audioCtx.createGain()

          osc.connect(gain)
          gain.connect(audioCtx.destination)

          osc.type = "triangle"
          osc.frequency.setValueAtTime(600, now)
          osc.frequency.linearRampToValueAtTime(800, now + 0.2)

          gain.gain.setValueAtTime(0.15, now)
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25)

          osc.start(now)
          osc.stop(now + 0.25)
          break
        }

        case "wrong":
        default: {
          const osc = audioCtx.createOscillator()
          const gain = audioCtx.createGain()

          osc.type = "sawtooth"
          osc.connect(gain)
          gain.connect(audioCtx.destination)

          osc.frequency.setValueAtTime(140, now)
          osc.frequency.linearRampToValueAtTime(70, now + 0.4)

          gain.gain.setValueAtTime(0.2, now)
          gain.gain.linearRampToValueAtTime(0.01, now + 0.4)

          osc.start(now)
          osc.stop(now + 0.4)
          break
        }
      }
    }

    function checkAnswers() {
      if (audioCtx && audioCtx.state === "suspended") audioCtx.resume()

      let correctCount = 0

      const isAllAnswered1 = inputs1.every((item) =>
        item.questions.every((question) => {
          const inputEl = document.getElementById(question.id)
          return inputEl && inputEl.value
        })
      )

      const isAllAnswered2 = inputs2.every(item => {
        return document.getElementById(item.id).value
      })

      const msg = document.getElementById("message")
      msg.style.transform = "scale(1)"

      if (!isAllAnswered1 || !isAllAnswered2) {
        inputs1.forEach((item) => {
          item.questions.forEach(question => {
            const el = document.getElementById(question.id)
            console.log('el', el.value)
            if (!el.value) {
              el.classList.add("warning")
            }
          })
        })
        inputs2.forEach((item) => {
          const el = document.getElementById(item.id)
          if (!el.value) {
            el.classList.add("warning")
          }
        })
        playSound("warning")
        msg.textContent = "HÃY ĐIỀN HẾT CÂU TRẢ LỜI! ⚠️"
        msg.className =
          "mt-8 text-center text-3xl font-black text-amber-600 transition-all transform scale-100"
        return
      }

      inputs1.forEach((item) => {
        item.questions.forEach(question => {
          const el = document.getElementById(question.id)

          if (el.value == question.ans) {
            el.classList.add("correct")
            el.classList.remove("incorrect")
            correctCount++
          } else {
            el.classList.add("incorrect")
            el.classList.remove("correct")
          }
        })
      })

      inputs2.forEach((item) => {
        const el = document.getElementById(item.id)

        if (el.value === item.ans) {
          el.classList.add("correct")
          el.classList.remove("incorrect")
          correctCount++
        } else {
          el.classList.add("incorrect")
          el.classList.remove("correct")
        }
      })

      if (correctCount === inputs1.reduce((acc, curr) => acc + curr.questions.length, 0) + inputs2.length) {
        playSound("correct")
        msg.textContent = "CHÍNH XÁC! GIỎI QUÁ! 🌟"
        msg.className =
          "mt-8 text-center text-3xl font-black text-green-600 transition-all transform scale-100"
        showConfetti()
      } else {
        playSound("wrong")
        msg.textContent = "SAI RỒI! THỬ LẠI NHÉ! ❌"
        msg.className =
          "mt-8 text-center text-3xl font-black text-red-500 transition-all transform scale-100"
      }
    }

    function resetApp() {
      inputs1.forEach((item) => {
        item.questions.forEach(question => {
          const el = document.getElementById(question.id)
          el.value = null
          el.classList.remove("correct", "incorrect", 'warning')
        })
      })

      inputs2.forEach(({ id }) => {
        const el = document.getElementById(id)
        el.value = ""
        el.classList.remove("correct", "incorrect", 'warning')
      })

      document.getElementById("message").style.transform = "scale(0)"
      document.getElementById("confetti").style.display = "none"
    }

    function showConfetti() {
      const c = document.getElementById("confetti")
      c.style.display = "block"
      setTimeout(() => {
        c.style.display = "none"
      }, 2000)
    }
  </script>
</body>

</html>

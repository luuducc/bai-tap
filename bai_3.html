<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />

  <title>Bài Tập</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .ruler-container {
      background-color: #f0f9ff;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .ruler-image {
      background-color: #ff99bb;
      height: 60px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      position: relative;
      margin: 40px 0;
    }

    .tick {
      width: 2px;
      background-color: #333;
      position: absolute;
    }

    .tick-large {
      height: 30px;
    }

    .tick-small {
      height: 15px;
    }

    .label {
      position: absolute;
      top: -35px;
      font-weight: bold;
      font-size: 1.2rem;
      transform: translateX(-50%);
    }

    input:focus {
      outline: none;
      /* ring: 2px solid #3b82f6; */
    }

    .correct {
      background-color: #d1fae5 !important;
      border-color: #10b981 !important;
      color: #065f46 !important;
      animation: bounce 0.5s;
    }

    .incorrect {
      background-color: #fee2e2 !important;
      border-color: #ef4444 !important;
      color: #991b1b !important;
      animation: shake 0.3s;
    }

    .warning {
      background-color: #fef3c7 !important;
      /* soft yellow */
      border-color: #f59e0b !important;
      /* amber */
      color: #92400e !important;
      /* dark amber text */
      animation: pulse 0.4s;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-8px);
      }

      75% {
        transform: translateX(8px);
      }
    }

    .confetti {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 5rem;
      z-index: 50;
      display: none;
      pointer-events: none;
    }

    .custom-select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background: none;
      /* remove default styling */
      cursor: pointer;

      padding: 0;
      /* remove default padding */
      text-align: center;
      /* horizontal center */
      line-height: 3rem;
      /* match height (h-12 = 48px ≈ 3rem) */
    }
  </style>
</head>

<body class="bg-blue-50 min-h-screen flex items-center justify-center p-4">

    <!-- Nộp bài -->
    <div class="flex gap-4">

      <button onclick="resetApp()"
        class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-5 rounded-2xl active:scale-95">

    <div id="message" class="mt-8 text-center text-3xl font-black transition-all transform scale-0"></div>

  <div id="confetti" class="confetti">✨🥳✨</div>

  <script>
    let audioCtx

    const answers = { A: 10, B: 11, C: 12 }

    const inputs2 = [
      {
        id: 'select-1',
        val: document.getElementById('select-1').value,
        ans: '<'
      },
      {
        id: 'select-2',
        val: document.getElementById('select-2').value,
        ans: '='
      },
      {
        id: 'select-3',
        val: document.getElementById('select-3').value,
        ans: '<'
      },
      {
        id: 'select-4',
        val: document.getElementById('select-4').value,
        ans: '='
      },
      {
        id: 'select-5',
        val: document.getElementById('select-5').value,
        ans: '>'
      },
      {
        id: 'select-6',
        val: document.getElementById('select-6').value,
        ans: '<'
      },
      {
        id: 'select-7',
        val: document.getElementById('select-7').value,
        ans: '>'
      },
    ]
    
    function onSelectChange(selectId) {
      document.getElementById(selectId).classList.remove('correct', 'incorrect', 'warning')
    }

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)()
      }
    }

    // Fallback sounds in case external links fail to load due to CORS/Network
    function playSound(type) {
      initAudio()
      const now = audioCtx.currentTime

      switch (type) {
        case "correct": {
          const playTing = (time) => {
            const osc = audioCtx.createOscillator()
            const gain = audioCtx.createGain()
            osc.connect(gain)
            gain.connect(audioCtx.destination)

            osc.type = "sine"
            osc.frequency.setValueAtTime(1046.5, time)
            gain.gain.setValueAtTime(0.2, time)
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3)

            osc.start(time)
            osc.stop(time + 0.3)
          }

          playTing(now)
          playTing(now + 0.1)
          break
        }

        case "warning": {
          // softer, neutral notification (mid-high tone, short)
          const osc = audioCtx.createOscillator()
          const gain = audioCtx.createGain()

          osc.connect(gain)
          gain.connect(audioCtx.destination)

          osc.type = "triangle"
          osc.frequency.setValueAtTime(600, now)
          osc.frequency.linearRampToValueAtTime(800, now + 0.2)

          gain.gain.setValueAtTime(0.15, now)
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25)

          osc.start(now)
          osc.stop(now + 0.25)
          break
        }

        case "wrong":
        default: {
          const osc = audioCtx.createOscillator()
          const gain = audioCtx.createGain()

          osc.type = "sawtooth"
          osc.connect(gain)
          gain.connect(audioCtx.destination)

          osc.frequency.setValueAtTime(140, now)
          osc.frequency.linearRampToValueAtTime(70, now + 0.4)

          gain.gain.setValueAtTime(0.2, now)
          gain.gain.linearRampToValueAtTime(0.01, now + 0.4)

          osc.start(now)
          osc.stop(now + 0.4)
          break
        }
      }
    }

    // function playSound(type) {
    //   const audioEl = document.getElementById(`audio-${type}`)

    //   // Attempt to play the audio from the link
    //   if (audioEl) {
    //     audioEl.currentTime = 0
    //     audioEl.play().catch((e) => {
    //       console.log("External audio failed, using fallback:", e)
    //       playFallbackSound(type)
    //     })
    //   } else {
    //     playFallbackSound(type)
    //   }
    // }


    function checkAnswers() {
      if (audioCtx && audioCtx.state === "suspended") audioCtx.resume()

      let correctCount = 0

      const isAllAnswered = inputs2.every(item => {
        return document.getElementById(item.id).value
      })

      const msg = document.getElementById("message")
      msg.style.transform = "scale(1)"

      if (!isAllAnswered) {
        inputs2.forEach((item) => {
          const el = document.getElementById(item.id)
          if (!el.value) {
            el.classList.add("warning")
          }
        })
        playSound("warning")
        msg.textContent = "HÃY ĐIỀN HẾT CÂU TRẢ LỜI! ⚠️"
        msg.className =
          "mt-8 text-center text-3xl font-black text-amber-600 transition-all transform scale-100"
        return
      }

      inputs2.forEach((item) => {
        const el = document.getElementById(item.id)

        console.log('here', el.value)
        console.log('here2', item.ans)
        if (el.value === item.ans) {
          el.classList.add("correct")
          el.classList.remove("incorrect")
          correctCount++
        } else {
          el.classList.add("incorrect")
          el.classList.remove("correct")
        }
      })

      if (correctCount === inputs2.length) {
        playSound("correct")
        msg.textContent = "CHÍNH XÁC! GIỎI QUÁ! 🌟"
        msg.className =
          "mt-8 text-center text-3xl font-black text-green-600 transition-all transform scale-100"
        showConfetti()
      } else {
        playSound("wrong")
        msg.textContent = "SAI RỒI! THỬ LẠI NHÉ! ❌"
        msg.className =
          "mt-8 text-center text-3xl font-black text-red-500 transition-all transform scale-100"
      }
    }

    function resetApp() {
      inputs2.forEach(({ id }) => {
        const el = document.getElementById(id)
        el.value = ""
        el.classList.remove("correct", "incorrect", 'warning')
      })

      document.getElementById("message").style.transform = "scale(0)"
      document.getElementById("confetti").style.display = "none"
    }

    function showConfetti() {
      const c = document.getElementById("confetti")
      c.style.display = "block"
      setTimeout(() => {
        c.style.display = "none"
      }, 2000)
    }
  </script>
